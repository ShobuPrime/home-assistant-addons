name: Builder

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  repository_dispatch:
    types: [automated-pr-created]

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize build
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
      all_addons: ${{ steps.all_addons.outputs.addons }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.head_sha || '' }}
          fetch-depth: 0

      - name: Discover all add-ons
        id: all_addons
        run: |
          # Dynamically find all addon directories (those with config.yaml)
          declare -a all_addons
          for config in */config.yaml; do
            addon_dir=$(dirname "$config")
            # Skip hidden directories and non-addon directories
            if [[ ! "$addon_dir" =~ ^\. ]]; then
              all_addons+=("$addon_dir")
              echo "Found addon: $addon_dir"
            fi
          done

          # Create JSON array of all addons
          addons_json=$(printf '%s\n' "${all_addons[@]}" | jq -R . | jq -sc '.')
          echo "addons=${addons_json}" >> "$GITHUB_OUTPUT"
          echo "All addons: ${addons_json}"

      - name: Find changed add-ons
        id: changed_addons
        run: |
          declare -a changed_addons

          # For repository_dispatch, use the addon from client_payload
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            DISPATCH_ADDON="${{ github.event.client_payload.addon }}"
            echo "Triggered via repository_dispatch for addon: ${DISPATCH_ADDON}"

            if [ "${DISPATCH_ADDON}" = "all" ]; then
              for config in */config.yaml; do
                addon_dir=$(dirname "$config")
                if [[ ! "$addon_dir" =~ ^\. ]]; then
                  changed_addons+=("\"${addon_dir}\"")
                  echo "Building addon: $addon_dir"
                fi
              done
            else
              changed_addons+=("\"${DISPATCH_ADDON}\"")
              echo "Building addon: ${DISPATCH_ADDON}"
            fi

          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs, diff against the base branch
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "${BASE_REF}"
            CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")
            echo "Changed files vs ${BASE_REF}:"
            echo "$CHANGED_FILES"

            for config in */config.yaml; do
              addon_dir=$(dirname "$config")
              if [[ ! "$addon_dir" =~ ^\. ]]; then
                if echo "$CHANGED_FILES" | grep -q "^${addon_dir}/"; then
                  changed_addons+=("\"${addon_dir}\"")
                  echo "Addon changed: $addon_dir"
                fi
              fi
            done

          elif [ "${{ github.event_name }}" = "push" ]; then
            # For pushes to main/master, diff against the previous commit
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "Initial push, building all addons"
              for config in */config.yaml; do
                addon_dir=$(dirname "$config")
                if [[ ! "$addon_dir" =~ ^\. ]]; then
                  changed_addons+=("\"${addon_dir}\"")
                fi
              done
            else
              CHANGED_FILES=$(git diff --name-only "${BEFORE}...HEAD")
              echo "Changed files since ${BEFORE}:"
              echo "$CHANGED_FILES"

              for config in */config.yaml; do
                addon_dir=$(dirname "$config")
                if [[ ! "$addon_dir" =~ ^\. ]]; then
                  if echo "$CHANGED_FILES" | grep -q "^${addon_dir}/"; then
                    changed_addons+=("\"${addon_dir}\"")
                    echo "Addon changed: $addon_dir"
                  fi
                fi
              done
            fi
          fi

          # Fallback: if no addon-specific changes detected, skip building
          if [[ ${#changed_addons[@]} -eq 0 ]]; then
            echo "No addon-specific changes detected, skipping builds"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo 'addons=[]' >> "$GITHUB_OUTPUT"
          else
            changed=$(echo ${changed_addons[@]} | jq -sc '.')
            echo "addons=${changed}" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "Changed addons: $(echo ${changed_addons[@]} | jq -sc '.')"

  build:
    needs: init
    runs-on: ubuntu-latest
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.addon }} add-on
    strategy:
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.head_sha || '' }}

      - name: Build ${{ matrix.addon }} add-on
        uses: home-assistant/builder@master
        with:
          args: |
            --test \
            --target /data/${{ matrix.addon }} \
            --docker-hub shobuprime \
            --image ${{ matrix.addon }} \
            --amd64 \
            --aarch64
